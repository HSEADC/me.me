  <body>
    <canvas id="noise"></canvas>

    <nav class="O_Header">
      <a href="../index.html">
        <img src="../images/logo.svg" class="A_Logo" />
      </a>
      <div class="W_Header_all_links">
        <a href="../index.html" class="hd A_HeaderLink">
          <h3 class="Q_HeaderLink">главная</h3>
        </a>
        <a href="./about.html" class="hd A_HeaderLink">
          <h3 class="Q_HeaderLink">о нас</h3>
        </a>
        <a href="./articles.html" class="hd A_HeaderLink">
          <h3 class="Q_HeaderLink">статьи</h3>
        </a>
        <a href="./interactives.html" class="hd A_HeaderLinkCurrent">
          <h3 class="Q_HeaderLink">интерактивы</h3>
        </a>
      </div>
    </nav>

    <section class="S_Constructor">
      <div class="M_ConstructorHeading">
        <div class="A_HeaderPart">
          <h1 class="hd Q_HeaderText">создай мем</h1>
          <span class="Q_ImageInHeader" aria-hidden="true"></span>
        </div>
      </div>

      <div class="O_ConstructorContent">
        <div class="W_ConstructorLeft">
          <div class="A_ConstructorPreview">
            <canvas class="Q_ConstructorCanvas" width="900" height="900"></canvas>
          </div>
        </div>

        <div class="W_ConstructorRight">
          <p class="hd A_TextBlock">выбери картинку или загрузи свою</p>
          <div class="M_ConstructorPresets">
            <div class="A_ConstructorPreset Preset-1"></div>
            <div class="A_ConstructorPreset Preset-2"></div>
            <div class="A_ConstructorPreset Preset-3"></div>
            <div class="A_ConstructorPreset Preset-4"></div>
            <div class="A_ConstructorPreset Preset-5"></div>
            <div class="A_ConstructorPreset Preset-6"></div>
            <div class="A_ConstructorPreset Preset-7"></div>
            <div class="A_ConstructorPreset Preset-8"></div>
          </div>

          <button class="A_ConstructorButtonUpload">
            <span class="Q_ArrowUp"></span>
            <span class="Q_UploadText">загрузить фото</span>
          </button>

          <div class="M_ConstructorInput">
            <p class="hd A_TextBlock">введи смешную подпись к картинке</p>
            <input class="A_ConstructorInputRow" type="text" placeholder="Введите текст для мема" />
          </div>

          <button class="A_ConstructorButtonDownload">
            <span class="Q_ArrowDown"></span>
            <span class="Q_UploadText">сохранить мем</span>
          </button>
          <input class="A_ConstructorFileInput" type="file" accept="image/*" hidden />
        </div>
      </div>
    </section>

    <footer class="O_Footer">
      <div class="W_Footer_all_links">

          тик ток
