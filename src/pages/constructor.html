<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Создайте свой мем!</title>
    <meta name="title" content="О медиа о мемах ME.ME!" />
    <meta name="description" content="Старые и новые, свежие и протухшие, смешные и несмешные — мы посмотрим все! А потом ещё и обсудить успеем!" />
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:local" content="ru_RU" />
    <meta property="og:site_name" content="ME.ME" />
    <meta property="og:url" content="https://hseadc.github.io/me.me/index.html" />
    <meta property="og:title" content="О медиа о мемах ME.ME!" />
    <meta property="og:description" content="Старые и новые, свежие и протухшие, смешные и несмешные — мы посмотрим все! А потом ещё и обсудить успеем!" />
    <meta property="og:image" content="https://raw.githubusercontent.com/HSEADC/me.me/refs/heads/main/src/images/meta/og_index.png" />
    <!-- X (Twitter) -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://hseadc.github.io/me.me/index.html" />
    <meta property="twitter:title" content="О медиа о мемах ME.ME!" />
    <meta property="twitter:description" content="Старые и новые, свежие и протухшие, смешные и несмешные — мы посмотрим все! А потом ещё и обсудить успеем!" />
    <meta property="twitter:image" content="https://raw.githubusercontent.com/HSEADC/me.me/refs/heads/main/src/images/meta/og_index.png" />
    <link rel="icon" href="../images/logo.ico" rel="icon" />
  </head>
  <body>
    <nav class="M_Header"></nav>

    <div class="W_CreateContent">
      <section class="S_BasicHeadSection">
        <div class="A_Background">
          <video class="Q_BGContent" autoplay muted loop playsinline>
            <source src="../videos/create_bg.webm" type="video/webm" />
          </video>
          <div class="Q_VideoFrame"></div>
          <div class="Q_BGSpikes"></div>
        </div>

        <div class="M_HeadText">
          <div class="A_PartOfBig">
            <span class="Q_ImageInHeader" aria-hidden="true"></span>
            <h1 class="hd Q_HeaderText">создай мем</h1>
            <span class="Q_ImageInHeader" aria-hidden="true"></span>
          </div>
        </div>
      </section>

      <section class="S_Generate">
        <div class="A_FrameGenerateImg"><canvas class="Q_ConstructorCanvas" width="900" height="900"></canvas></div>
        <div class="O_GenCreate">
          <div class="M_GenImgBlock">
            <p class="Q_GenText">Выбери картинку или загрузи свою</p>
            <div class="W_GenImages">
              <div class="Q_GenImage Preset-1"></div>
              <div class="Q_GenImage Preset-2"></div>
              <div class="Q_GenImage Preset-3"></div>
              <div class="Q_GenImage Preset-4"></div>
              <div class="Q_GenImage Preset-5"></div>
              <div class="Q_GenImage Preset-6"></div>
              <div class="Q_GenImage Preset-7"></div>
              <div class="Q_GenImage Preset-8"></div>
            </div>

            <button id="Upload" class="A_Button">
              <span class="Q_ArrowUp"></span>
              <span class="Q_UploadText">загрузить фото</span>
            </button>
          </div>

          <div class="M_GenTextBlock">
            <div class="A_GenInput">
              <p class="Q_GenText">введи смешную подпись к картинке</p>
              <input id="CreateInput" class="Q_GenInputRow" type="text" placeholder="Введите текст для мема" />
            </div>
          </div>

          <button id="Download" class="A_Button">
            <span class="Q_ArrowDown"></span>
            <span class="Q_UploadText">скачать мем</span>
          </button>
          <input class="A_ConstructorFileInput" type="file" accept="image/*" hidden />
        </div>
      </section>
    </div>

    <footer class="M_Footer"></footer>
  </body>
</html>
