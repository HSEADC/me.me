<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Создайте свой мем!</title>
    <meta name="title" content="О медиа о мемах ME.ME!" />
    <meta
      name="description"
      content="Старые и новые, свежие и протухшие, смешные и несмешные — мы посмотрим все! А потом ещё и обсудить успеем!"
    />
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:local" content="ru_RU" />
    <meta property="og:site_name" content="ME.ME" />
    <meta
      property="og:url"
      content="https://hseadc.github.io/me.me/index.html"
    />
    <meta property="og:title" content="О медиа о мемах ME.ME!" />
    <meta
      property="og:description"
      content="Старые и новые, свежие и протухшие, смешные и несмешные — мы посмотрим все! А потом ещё и обсудить успеем!"
    />
    <meta
      property="og:image"
      content="https://raw.githubusercontent.com/HSEADC/me.me/refs/heads/main/src/images/meta/og_index.png"
    />
    <!-- X (Twitter) -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta
      property="twitter:url"
      content="https://hseadc.github.io/me.me/index.html"
    />
    <meta property="twitter:title" content="О медиа о мемах ME.ME!" />
    <meta
      property="twitter:description"
      content="Старые и новые, свежие и протухшие, смешные и несмешные — мы посмотрим все! А потом ещё и обсудить успеем!"
    />
    <meta
      property="twitter:image"
      content="https://raw.githubusercontent.com/HSEADC/me.me/refs/heads/main/src/images/meta/og_index.png"
    />
    <link rel="icon" href="../images/logo.ico" rel="icon" />
  </head>
  <body class="constructor">
    <canvas id="noise"></canvas>

    <nav class="O_Header">
      <a href="../index.html">
        <img src="../images/logo.svg" class="A_Logo" />
      </a>
      <div class="W_Header_all_links">
        <a href="../index.html" class="hd A_HeaderLink">
          <h3 class="Q_HeaderLink">главная</h3>
        </a>
        <a href="./about.html" class="hd A_HeaderLink">
          <h3 class="Q_HeaderLink">о нас</h3>
        </a>
        <a href="./articles.html" class="hd A_HeaderLink">
          <h3 class="Q_HeaderLink">статьи</h3>
        </a>
        <a href="./interactives.html" class="hd A_HeaderLinkCurrent">
          <h3 class="Q_HeaderLink">интерактивы</h3>
        </a>
      </div>
    </nav>

    <section class="create-meme-page">
      <span class="hd-img timg-non-1" aria-hidden="true"></span>
      <h1 class="hd create-title">
        создай мем <span class="hd-img timg-3" aria-hidden="true"></span>
      </h1>
      <section class="meme-builder" id="memeBuilder">
        <div class="mb-stage">
          <div class="mb-preview">
            <canvas
              class="mb-canvas"
              id="mbCanvas"
              width="1200"
              height="900"
            ></canvas>
          </div>
        </div>
        <div class="mb-panel">
          <h2 class="hd const-pick">выбери картинку или загрузи свою</h2>
          <button class="mb-upload-wide" id="mbUploadBtn" type="button">
            загрузить фото
          </button>
          <div class="mb-presets">
            <div class="mb-preset preset-1"></div>
            <div class="mb-preset preset-2"></div>
            <div class="mb-preset preset-3"></div>
            <div class="mb-preset preset-4"></div>
            <div class="mb-preset preset-5"></div>
            <div class="mb-preset preset-6"></div>
            <div class="mb-preset preset-7"></div>
            <div class="mb-preset preset-8"></div>
          </div>
          <div class="mb-text-row">
            <input
              class="mb-input"
              id="mbText"
              type="text"
              placeholder="Введите текст для мема"
            />
          </div>
          <button class="mb-download-wide" id="mbDownloadBtn" type="button">
            скачать мой мем
          </button>
          <input id="mbFile" type="file" accept="image/*" hidden />
        </div>
      </section>
    </section>

    <footer class="O_Footer">
      <div class="W_Footer_all_links">
        <a
          href="https://t.me/memememememememememememememeemem"
          class="A_FooterLink"
          >тг-канал</a
        >
        <a href="../index.html">
          <img src="../images/logo-pink.svg" alt="logo" class="A_FooterLogo" />
        </a>
        <a
          href="https://www.tiktok.com/@me.me.media?_r=1&_t=ZM-92T5yGjtwEe"
          class="A_FooterLink"
        >
          тик ток
        </a>
      </div>
    </footer>
  </body>
</html>
